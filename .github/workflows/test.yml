# Test Suite — disabled after Postgres migration.
# The CI used SQLite (file:./test.db) which no longer matches the Postgres schema.
# Re-enable when tests are updated for Postgres (remove the `if: false` line).

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
